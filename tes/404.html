<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mengalihkan...</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fafafa;
            font-family: 'RobotoMono', monospace;
            color: #666;
        }
        .loader-container {
            text-align: center;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(33, 150, 243, 0.1);
            border-top-color: #2196f3;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
    <script>
        // Ambil info lokasi saat ini
        const loc = window.location;
        
        // Simpan full path tujuan saat ini ke sessionStorage
        sessionStorage.setItem('spa_redirect', loc.pathname + loc.search + loc.hash);
        
        // Cari tahu base path dinamis
        let base = '/tes';
        const pathSegments = loc.pathname.split('/');
        
        if (loc.hostname.includes('github.io')) {
            // Di GitHub Pages, segment pertama adalah nama repository
            if (pathSegments[1]) {
                base = '/tes' + pathSegments[1];
            }
        } else {
            // Di localhost, jika folder root project-nya adalah 'gc'
            if (pathSegments[1] === 'gc') {
                base = '/gc';
            }
        }
        
        // Redirect ke base path (index.html)
        const redirectUrl = loc.protocol + '//' + loc.host + (base === '/' ? '' : base) + '/';
        loc.replace(redirectUrl);
    </script>
</head>
<body>
    <div class="loader-container">
        <div class="spinner"></div>
        <p>Mengalihkan halaman...</p>
    </div>
</body>
</html>
